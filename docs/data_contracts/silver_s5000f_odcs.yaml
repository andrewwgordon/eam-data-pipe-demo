title: "EAM Silver-S5000F Data Contracts"
version: "1.0.0"
description: "Open Data Contract Standard definitions for Silver-S5000F tables that map application entities to ASD S5000F concepts."
owner: "eam-data-pipe-demo"
layer: "silver_s5000f"
datasets:
  - name: "silver_s5000f.product_instance"
    description: "S5000F ProductInstance records representing maintainable physical items."
    partition_keys: []
    fields:
      - name: "product_instance_id"
        type: "string"
      - name: "name"
        type: "string"
      - name: "type"
        type: "string"
      - name: "location"
        type: "string"
      - name: "operational_status"
        type: "string"
      - name: "installation_date"
        type: "string"
        format: "ISO-8601"
      - name: "source_system"
        type: "string"
      - name: "source_id"
        type: "string"
      - name: "mapped_at"
        type: "string"
    lineage:
      upstream: "silver.asset"
      downstream: "gold.mtbf_metrics"

  - name: "silver_s5000f.functional_failure"
    description: "S5000F FunctionalFailure records representing reported failure modes."
    partition_keys: []
    fields:
      - name: "functional_failure_id"
        type: "string"
      - name: "product_instance_id"
        type: "string"
      - name: "failure_description"
        type: "string"
      - name: "priority"
        type: "string"
      - name: "reported_at"
        type: "string"
        format: "ISO-8601"
      - name: "source_system"
        type: "string"
      - name: "source_id"
        type: "string"
      - name: "mapped_at"
        type: "string"
    lineage:
      upstream: "silver.work_request"
      downstream: "gold.mtbf_metrics"

  - name: "silver_s5000f.maintenance_task"
    description: "S5000F MaintenanceTask records representing planned maintenance activities."
    partition_keys: []
    fields:
      - name: "maintenance_task_id"
        type: "string"
      - name: "product_instance_id"
        type: "string"
      - name: "functional_failure_id"
        type: "string"
      - name: "status"
        type: "string"
      - name: "planned_start"
        type: "string"
        format: "ISO-8601"
      - name: "planned_end"
        type: "string"
        format: "ISO-8601"
      - name: "source_system"
        type: "string"
      - name: "source_id"
        type: "string"
      - name: "mapped_at"
        type: "string"
    lineage:
      upstream: "silver.work_order"
      downstream: "silver_s5000f.maintenance_event"

  - name: "silver_s5000f.maintenance_task_step"
    description: "S5000F MaintenanceTaskStep records representing atomic maintenance actions."
    partition_keys: []
    fields:
      - name: "task_step_id"
        type: "string"
      - name: "maintenance_task_id"
        type: "string"
      - name: "step_number"
        type: "long"
      - name: "description"
        type: "string"
      - name: "status"
        type: "string"
      - name: "started_at"
        type: "string"
        format: "ISO-8601"
      - name: "completed_at"
        type: "string"
        format: "ISO-8601"
      - name: "source_system"
        type: "string"
      - name: "source_id"
        type: "string"
      - name: "mapped_at"
        type: "string"
    lineage:
      upstream: "silver.maintenance_action"
      downstream: "none"

  - name: "silver_s5000f.maintenance_event"
    description: "S5000F MaintenanceEvent records representing executed maintenance activity."
    partition_keys: []
    fields:
      - name: "maintenance_event_id"
        type: "string"
      - name: "maintenance_task_id"
        type: "string"
      - name: "product_instance_id"
        type: "string"
      - name: "actual_start"
        type: "string"
        format: "ISO-8601"
      - name: "actual_end"
        type: "string"
        format: "ISO-8601"
      - name: "action_count"
        type: "long"
      - name: "source_system"
        type: "string"
      - name: "source_id"
        type: "string"
      - name: "mapped_at"
        type: "string"
    lineage:
      upstream: "silver.work_order -> silver_s5000f.maintenance_task"
      downstream: "gold.maintenance_history"
