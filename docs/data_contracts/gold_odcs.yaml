title: "EAM Gold Data Contracts"
version: "1.0.0"
description: "Open Data Contract Standard definitions for Gold analytics tables in Iceberg. These contracts describe derived metrics built from Silver and Silver-S5000F source tables."
owner: "eam-data-pipe-demo"
layer: "gold"
datasets:
  - name: "gold.asset_availability"
    description: "Point-in-time asset availability metrics derived from Silver asset state."
    partition_keys: []
    fields:
      - name: "asset_id"
        type: "string"
      - name: "name"
        type: "string"
      - name: "asset_type"
        type: "string"
      - name: "location"
        type: "string"
      - name: "status"
        type: "string"
      - name: "is_available"
        type: "boolean"
      - name: "availability_pct"
        type: "double"
      - name: "computed_at"
        type: "string"
        format: "ISO-8601"
    lineage:
      upstream: "silver.asset"
      downstream: "none"

  - name: "gold.maintenance_history"
    description: "Aggregated maintenance event history per asset from Silver-S5000F maintenance events."
    partition_keys: []
    fields:
      - name: "product_instance_id"
        type: "string"
      - name: "asset_source_id"
        type: "string"
      - name: "event_count"
        type: "long"
      - name: "first_maintenance"
        type: "string"
        format: "ISO-8601"
      - name: "last_maintenance"
        type: "string"
        format: "ISO-8601"
      - name: "total_actions"
        type: "long"
      - name: "computed_at"
        type: "string"
        format: "ISO-8601"
    lineage:
      upstream: "silver_s5000f.maintenance_event"
      downstream: "none"

  - name: "gold.work_order_backlog"
    description: "Summary of open work orders and backlog by priority and asset."
    partition_keys: []
    fields:
      - name: "priority"
        type: "string"
      - name: "asset_id"
        type: "string"
      - name: "open_count"
        type: "long"
      - name: "oldest_planned_start"
        type: "string"
        format: "ISO-8601"
      - name: "computed_at"
        type: "string"
        format: "ISO-8601"
    lineage:
      upstream: "silver.work_order, silver.work_request"
      downstream: "none"

  - name: "gold.mtbf_metrics"
    description: "Simplified MTBF proxy metrics by asset type derived from Silver-S5000F product instances and functional failures."
    partition_keys: []
    fields:
      - name: "type"
        type: "string"
      - name: "asset_count"
        type: "long"
      - name: "failure_count"
        type: "long"
      - name: "failures_per_asset"
        type: "double"
      - name: "mtbf_proxy_hours"
        type: "double"
      - name: "computed_at"
        type: "string"
        format: "ISO-8601"
    lineage:
      upstream: "silver_s5000f.product_instance, silver_s5000f.functional_failure"
      downstream: "none"
