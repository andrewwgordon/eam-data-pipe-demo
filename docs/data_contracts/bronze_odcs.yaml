title: "EAM Bronze Data Contracts"
version: "1.0.0"
description: "Open Data Contract Standard definitions for raw CDC Bronze datasets stored in Iceberg. These contracts describe append-only CDC payloads from the simulated EAM source system."
owner: "eam-data-pipe-demo"
layer: "bronze"
datasets:
  - name: "cdc.asset"
    description: "Raw CDC events for Asset entities from the simulated EAM system."
    source: "Kafka topic cdc.asset"
    partition_keys: ["event_date"]
    fields:
      - name: "entity"
        type: "string"
        description: "Entity type, always 'Asset' for this dataset."
      - name: "op"
        type: "string"
        description: "CDC operation code: c, u, or d."
      - name: "event_ts"
        type: "string"
        format: "ISO-8601"
        description: "Timestamp for the CDC event."
      - name: "pk_id"
        type: "string"
        description: "Primary key identifier for the entity instance."
      - name: "payload_json"
        type: "string"
        description: "Serialized JSON payload containing before/after state details."
      - name: "event_date"
        type: "string"
        description: "Partition column derived from event_ts."
      - name: "source_system"
        type: "string"
        description: "Source system identifier, typically simulated-eam."
    lineage:
      upstream: "Kafka cdc.asset"
      downstream: "Iceberg bronze.cdc.asset -> Silver asset via CDC merge"

  - name: "cdc.work_request"
    description: "Raw CDC events for WorkRequest entities."
    source: "Kafka topic cdc.work_request"
    partition_keys: ["event_date"]
    fields:
      - name: "entity"
        type: "string"
        description: "Entity type, always 'WorkRequest'."
      - name: "op"
        type: "string"
        description: "CDC operation code: c, u, or d."
      - name: "event_ts"
        type: "string"
        format: "ISO-8601"
      - name: "pk_id"
        type: "string"
      - name: "payload_json"
        type: "string"
      - name: "event_date"
        type: "string"
      - name: "source_system"
        type: "string"
    lineage:
      upstream: "Kafka cdc.work_request"
      downstream: "Iceberg bronze.cdc.work_request -> Silver work_request"

  - name: "cdc.work_order"
    description: "Raw CDC events for WorkOrder entities."
    source: "Kafka topic cdc.work_order"
    partition_keys: ["event_date"]
    fields:
      - name: "entity"
        type: "string"
      - name: "op"
        type: "string"
      - name: "event_ts"
        type: "string"
        format: "ISO-8601"
      - name: "pk_id"
        type: "string"
      - name: "payload_json"
        type: "string"
      - name: "event_date"
        type: "string"
      - name: "source_system"
        type: "string"
    lineage:
      upstream: "Kafka cdc.work_order"
      downstream: "Iceberg bronze.cdc.work_order -> Silver work_order"

  - name: "cdc.maintenance_action"
    description: "Raw CDC events for MaintenanceAction entities."
    source: "Kafka topic cdc.maintenance_action"
    partition_keys: ["event_date"]
    fields:
      - name: "entity"
        type: "string"
      - name: "op"
        type: "string"
      - name: "event_ts"
        type: "string"
        format: "ISO-8601"
      - name: "pk_id"
        type: "string"
      - name: "payload_json"
        type: "string"
      - name: "event_date"
        type: "string"
      - name: "source_system"
        type: "string"
    lineage:
      upstream: "Kafka cdc.maintenance_action"
      downstream: "Iceberg bronze.cdc.maintenance_action -> Silver maintenance_action"
