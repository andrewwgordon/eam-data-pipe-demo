title: "EAM Silver Data Contracts"
version: "1.0.0"
description: "Open Data Contract Standard definitions for Silver application state tables in Iceberg. These contracts describe current-state application entities after CDC resolution."
owner: "eam-data-pipe-demo"
layer: "silver"
datasets:
  - name: "silver.asset"
    description: "Current-state Asset records derived from Bronze CDC and CDC merge resolution."
    partition_keys: []
    fields:
      - name: "id"
        type: "string"
        description: "Unique asset identifier."
      - name: "name"
        type: "string"
      - name: "asset_type"
        type: "string"
      - name: "location"
        type: "string"
      - name: "status"
        type: "string"
      - name: "install_date"
        type: "string"
        format: "ISO-8601"
      - name: "updated_at"
        type: "string"
      - name: "source_system"
        type: "string"
      - name: "source_id"
        type: "string"
      - name: "last_op"
        type: "string"
      - name: "last_event_ts"
        type: "string"
    lineage:
      upstream: "Iceberg bronze.cdc.asset"
      downstream: "silver_s5000f.product_instance, gold.asset_availability"

  - name: "silver.work_request"
    description: "Current-state WorkRequest records derived from Bronze CDC resolution."
    partition_keys: []
    fields:
      - name: "id"
        type: "string"
      - name: "asset_id"
        type: "string"
      - name: "description"
        type: "string"
      - name: "priority"
        type: "string"
      - name: "status"
        type: "string"
      - name: "reported_at"
        type: "string"
        format: "ISO-8601"
      - name: "updated_at"
        type: "string"
      - name: "source_system"
        type: "string"
      - name: "source_id"
        type: "string"
      - name: "last_op"
        type: "string"
      - name: "last_event_ts"
        type: "string"
    lineage:
      upstream: "Iceberg bronze.cdc.work_request"
      downstream: "silver_s5000f.functional_failure, gold.work_order_backlog"

  - name: "silver.work_order"
    description: "Current-state WorkOrder records derived from CDC events and application state merge."
    partition_keys: []
    fields:
      - name: "id"
        type: "string"
      - name: "work_request_id"
        type: "string"
      - name: "asset_id"
        type: "string"
      - name: "status"
        type: "string"
      - name: "planned_start"
        type: "string"
        format: "ISO-8601"
      - name: "planned_end"
        type: "string"
        format: "ISO-8601"
      - name: "actual_start"
        type: "string"
        format: "ISO-8601"
      - name: "actual_end"
        type: "string"
        format: "ISO-8601"
      - name: "updated_at"
        type: "string"
      - name: "source_system"
        type: "string"
      - name: "source_id"
        type: "string"
      - name: "last_op"
        type: "string"
      - name: "last_event_ts"
        type: "string"
    lineage:
      upstream: "Iceberg bronze.cdc.work_order"
      downstream: "silver_s5000f.maintenance_task, silver_s5000f.maintenance_event, gold.work_order_backlog"

  - name: "silver.maintenance_action"
    description: "Current-state MaintenanceAction records representing executed or in-progress maintenance steps."
    partition_keys: []
    fields:
      - name: "id"
        type: "string"
      - name: "work_order_id"
        type: "string"
      - name: "step_number"
        type: "long"
      - name: "description"
        type: "string"
      - name: "status"
        type: "string"
      - name: "started_at"
        type: "string"
        format: "ISO-8601"
      - name: "completed_at"
        type: "string"
        format: "ISO-8601"
      - name: "source_system"
        type: "string"
      - name: "source_id"
        type: "string"
      - name: "last_op"
        type: "string"
      - name: "last_event_ts"
        type: "string"
    lineage:
      upstream: "Iceberg bronze.cdc.maintenance_action"
      downstream: "silver_s5000f.maintenance_task_step"
