    pricing_model: "Free for internal use"
    slas:
      availability: "99.9%"
      freshness: "Hourly"
    terms_of_use: "Internal use only. Redistribution prohibited."
    lineage:
      upstream: "bronze.cdc.work_request"
      downstream: "Silver-S5000F functional_failure"

  - name: "Current-State WorkOrder Records"
    dataset: "silver.work_order"
    description: "Current-state WorkOrder records derived from CDC events and application state merge."
